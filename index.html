<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk With Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="theme-toggle" class="nav-btn theme-btn">☀️ Light Mode</button>

    <main id="game-container">
        <div id="bg-layer"></div>

        <div id="main-menu" class="scene active">
            <h1 class="game-title">Talk With Me</h1>
            <button id="btn-start" class="primary-btn">Enter the Cafe</button>
        </div>

        <div id="selection-scene" class="scene hidden">
            <div class="selection-menu">
                <h2>The Cafe is bustling. Who do you approach?</h2>
                
                <div class="toolbar">
                    <input type="text" id="search-input" placeholder="Search character...">
                    <button id="btn-sort" class="action-btn">Sort A-Z</button>
                </div>

                <div class="choices" id="choices-container"></div>
            </div>
        </div>

        <div id="dialogue-scene" class="scene hidden">
            <button id="btn-back" class="nav-btn">⬅ Leave</button>
            
            <div id="character-sprite"></div>

            <div id="dialogue-ui">
                <h3 id="character-name">System</h3>
                <p id="dialogue-text">...</p>
                <div class="dialogue-controls">
                    <input type="text" id="user-input" placeholder="Say something..." autocomplete="off">
                    <button id="btn-talk" class="action-btn">Send</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
